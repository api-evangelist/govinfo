    namespace: openapi-published-rest
    port: 8080
    description: REST adapter for GovInfo API — Published. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/published/{dateissuedstartdate}
      name: published-dateissuedstartdate
      description: REST surface for published-dateIssuedStartDate.
      operations:
      - method: GET
        name: getpackagesbydateissued
        description: Retrieve list of packages based on dateIssued value
        call: openapi-published.getpackagesbydateissued
        with:
          dateIssuedStartDate: rest.dateIssuedStartDate
          offsetMark: rest.offsetMark
          offset: rest.offset
          pageSize: rest.pageSize
          collection: rest.collection
          congress: rest.congress
          docClass: rest.docClass
          billVersion: rest.billVersion
          modifiedSince: rest.modifiedSince
          courtCode: rest.courtCode
          courtType: rest.courtType
          state: rest.state
          topic: rest.topic
          isGLP: rest.isGLP
          natureSuitCode: rest.natureSuitCode
          natureSuit: rest.natureSuit
