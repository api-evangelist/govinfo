    port: 9090
    transport: http
    description: MCP adapter for GovInfo API — Published. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: retrieve-list-packages-based-dateissued
      description: Retrieve list of packages based on dateIssued value
      hints:
